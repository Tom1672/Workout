<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Oefeningen</title>

<style>
body {
    max-width: 700px;
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
    margin: auto;
}

h2 {
    margin-top: 15px;
}

.grid {
    display: grid;
    gap: 14px;
    margin: 20px auto;
    max-width: 600px;

    /* standaard = mobiel */
    grid-template-columns: repeat(3, 1fr);
}

/* desktop */
@media (min-width: 768px) {
    .grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

button {
    padding: 22px;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    background: #4CAF50;
    color: white;
}

button:active {
    transform: scale(0.97);
}

.random {
    background: #2196F3;
    width: 85%;
    margin: 20px auto;
    padding: 15px;
    font-size: 20px;
}

/* video scherm */
#playerContainer {
    display: none;
    padding: 10px;
}

video {
    width: 100%;
    max-width: 600px;
    border-radius: 10px;
}

.backBtn {
    margin-top: 10px;
    padding: 10px 20px;
    font-size: 16px;
    background: #f44336;
}
</style>
</head>

<body>

<h2 id="title">Oefeningen</h2>

<div id="main">
    <div class="grid" id="buttons"></div>
    <button class="random" onclick="randomVideo()">🎲 Random</button>
</div>

<div id="playerContainer">
    <video id="videoPlayer" controls autoplay></video><br>
    <button class="backBtn" onclick="goBack()">⬅ Terug</button>
</div>

// UI refs
const container = document.getElementById("buttons");
const main = document.getElementById("main");
const playerContainer = document.getElementById("playerContainer");
const player = document.getElementById("videoPlayer");

// buttons maken
videos.forEach((video, index) => {
    const btn = document.createElement("button");
    btn.innerText = index + 1;
    btn.onclick = () => playVideo(video, index + 1);
    container.appendChild(btn);
});

// video starten
function playVideo(url, number) {
    main.style.display = "none";
    playerContainer.style.display = "block";

    player.src = url;
    player.play();
}

// terug
function goBack() {
    player.pause();
    player.src = "";
    playerContainer.style.display = "none";
    main.style.display = "block";
}

// random
function randomVideo() {
    const index = Math.floor(Math.random() * videos.length);
    const number = index + 1;

    alert("Random oefening: " + number);
    playVideo(videos[index], number);
}

</script>

</body>
</html>
